<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="اعرف أي محطة وقود شغالة ومتوفر فيها بنزين في ليبيا - خريطة مباشرة لمحطات الوقود">
    <meta name="theme-color" content="#00d4aa">
    <title> خريطة محطات الوقود في ليبيا</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="styles.css?v=12">
    <link rel="stylesheet" href="vendor/leaflet.css">
    <link rel="preload" as="style"
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&amp;display=swap"
        onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&amp;display=swap">
    </noscript>
    <link rel="preload" as="image" href="brand-icon.svg">
    <link rel="icon" href="icon-192.png" type="image/png" sizes="192x192">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png" sizes="180x180">
</head>

<body>
    <!-- Header -->
    <header class="hero-header" id="mainHeader">
        <div class="logo-section">
            <div class="logo-icon logo-icon--brand" aria-hidden="true">
                <img src="brand-icon.svg" alt="" width="44" height="44" loading="eager" decoding="async">
            </div>
            <div class="logo-text">
                <h1>وين نلقى بنزينة</h1>
                <span>محطات الوقود في ليبيا</span>
            </div>
        </div>

        <div class="header-stats">
            <div class="stat-pill">
                <span class="dot green"></span>
                <span id="activeCount">0</span> محطة نشطة
            </div>
            <div class="stat-pill">
                <span class="dot blue"></span>
                <span id="totalCount">0</span> محطة مسجلة
            </div>
        </div>

        <div class="header-actions">
            <button type="button" class="btn btn-outline btn-sm pwa-install-btn" id="installPwaBtn" hidden
                aria-label="">
                <span class="pwa-install-btn-icon" aria-hidden="true">📲حمل الأن</span>
                <span class="pwa-install-btn-text">تثبيت</span>
            </button>
            <a href="admin.html" class="btn btn-outline btn-sm">لوحة التحكم</a>
            <button type="button" class="btn-icon" id="locateBtn" title="موقعي">📍</button>
        </div>
    </header>

    <!-- Map -->
    <div id="map"></div>

    <!-- Side Panel (mobile: draggable bottom sheet — starts collapsed so map stays visible) -->
    <div class="side-panel sheet-state-collapsed" id="sidePanel" data-sheet-state="collapsed">
        <div class="sheet-peek" id="sheetPeek">
            <button type="button" class="sheet-handle" id="sheetHandle" aria-controls="sheetBody" aria-expanded="false"
                aria-label="سحب أو ضغط لتوسيع لوحة البحث والمحطات"></button>
            <div class="sheet-peek-meta">
                <span class="sheet-peek-label">المحطات المعروضة</span>
                <span class="sheet-peek-badge" id="sheetPeekCount">0</span>
                <span class="sheet-peek-hint">اسحب للأعلى أو اضغط</span>
            </div>
        </div>
        <div class="sheet-body" id="sheetBody">
            <!-- Search -->
            <div class="panel-card">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="ابحث عن محطة أو مدينة...">
                    <span class="search-icon">🔍</span>
                </div>
            </div>

            <!-- Filters -->
            <div class="panel-card">
                <h3>تصفية النتائج</h3>
                <div class="filter-chips">
                    <button class="chip active" data-filter="all">الكل</button>
                    <button class="chip" data-filter="active">نشطة فقط</button>
                    <button class="chip" data-filter="benzine">بنزين</button>
                    <button class="chip" data-filter="diesel">ديزل</button>
                    <button class="chip" data-filter="both">بنزين + ديزل</button>
                </div>
            </div>

            <!-- Station List -->
            <div class="panel-card">
                <h3>المحطات (<span id="filteredCount">0</span>)</h3>
                <div class="station-list" id="stationList">
                    <div class="loading-spinner">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Mobile: quick open search / sheet (above collapsed strip) -->
    <button type="button" class="sheet-quick-search" id="sheetQuickSearch" aria-label="فتح البحث والنتائج">
        <span class="sheet-quick-search-icon" aria-hidden="true">🔍</span>
        <span>بحث وتصفية</span>
    </button>

    <!-- PWA install help (iOS / متصفحات بدون prompt) -->
    <div id="pwaInstallModal" class="pwa-modal" hidden aria-hidden="true">
        <div class="pwa-modal-backdrop" id="pwaInstallModalBackdrop" tabindex="-1"></div>
        <div class="pwa-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="pwaModalTitle">
            <button type="button" class="pwa-modal-close" id="pwaInstallModalClose" aria-label="إغلاق">×</button>
            <h3 id="pwaModalTitle" class="pwa-modal-title">تثبيت التطبيق</h3>
            <div id="pwaInstallModalBody" class="pwa-modal-body"></div>
            <button type="button" class="btn btn-primary btn-sm pwa-modal-ok" id="pwaInstallModalOk">حسناً</button>
        </div>
    </div>

    <!-- Navigation bar (route tracking) -->
    <aside id="navBar" class="nav-bar" hidden aria-live="polite">
        <div class="nav-bar-progress" aria-hidden="true">
            <div class="nav-bar-progress-fill" id="navProgressFill"></div>
        </div>
        <div class="nav-bar-loading" id="navBarLoading" hidden>
            <div class="spinner nav-spinner"></div>
            <span>جاري حساب المسار...</span>
        </div>
        <div class="nav-bar-inner">
            <div class="nav-bar-compact">
                <button type="button" class="nav-bar-stop" id="navStopBtn" aria-label="إيقاف التتبع">إيقاف</button>
                <div class="nav-bar-compact-main">
                    <span class="nav-bar-label">إلى</span>
                    <strong id="navDestName" class="nav-bar-dest-name">—</strong>
                    <span class="nav-bar-compact-meta">
                        <span id="navDistance">—</span>
                        <span class="nav-meta-dot" aria-hidden="true">·</span>
                        <span id="navEta">—</span>
                    </span>
                </div>
                <button type="button" class="nav-bar-more" id="navExpandBtn" aria-expanded="false"
                    aria-controls="navBarDetails" aria-label="خيارات إضافية">⋯</button>
            </div>
            <div class="nav-bar-details" id="navBarDetails" hidden>
                <div class="nav-bar-actions">
                    <button type="button" class="btn btn-primary btn-sm nav-recenter-btn" id="navRecenterBtn">توسيط</button>
                    <button type="button" class="btn btn-outline btn-sm" id="navExternalBtn">الخرائط</button>
                </div>
            </div>
        </div>
    </aside>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="vendor/leaflet.js" defer></script>
    <script src="api-config.js?v=12" defer></script>
    <script src="escape.js?v=12" defer></script>
    <script src="app.js?v=12" defer></script>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker
                    .register("sw.js?v=12", { scope: "./" })
                    .then(reg => {
                        reg.addEventListener("updatefound", () => {
                            const installing = reg.installing;
                            if (installing) {
                                installing.addEventListener("statechange", () => {
                                    if (installing.state === "installed" && navigator.serviceWorker.controller) {
                                        /* يتوفر تحديث جديد للـ SW */
                                    }
                                });
                            }
                        });
                    })
                    .catch(() => { /* فشل التسجيل لا يمنع عمل الصفحة */ });
            });
        }
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="اعرف أي محطة وقود شغالة ومتوفر فيها بنزين في ليبيا - خريطة مباشرة لمحطات الوقود">
    <meta name="theme-color" content="#0f172a">
    <title> خريطة محطات الوقود في ليبيا</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="vendor/leaflet.css">
    <link rel="preload" as="style"
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&amp;display=swap"
        onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&amp;display=swap">
    </noscript>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png" sizes="192x192">
</head>

<body>
    <!-- Header -->
    <header class="hero-header" id="mainHeader">
        <div class="logo-section">
            <div class="logo-icon">⛽</div>
            <div class="logo-text">
                <h1>وين نلقى بنزينة</h1>
                <span>محطات الوقود في ليبيا</span>
            </div>
        </div>

        <div class="header-stats">
            <div class="stat-pill">
                <span class="dot green"></span>
                <span id="activeCount">0</span> محطة نشطة
            </div>
            <div class="stat-pill">
                <span class="dot blue"></span>
                <span id="totalCount">0</span> محطة مسجلة
            </div>
        </div>

        <div class="header-actions">
            <a href="admin.html" class="btn btn-outline btn-sm">لوحة التحكم</a>
            <button class="btn-icon" id="locateBtn" title="موقعي">📍</button>
        </div>
    </header>

    <!-- Map -->
    <div id="map"></div>

    <!-- Side Panel (mobile: draggable bottom sheet — starts collapsed so map stays visible) -->
    <div class="side-panel sheet-state-collapsed" id="sidePanel" data-sheet-state="collapsed">
        <div class="sheet-peek" id="sheetPeek">
            <button type="button" class="sheet-handle" id="sheetHandle" aria-controls="sheetBody" aria-expanded="false"
                aria-label="سحب أو ضغط لتوسيع لوحة البحث والمحطات"></button>
            <div class="sheet-peek-meta">
                <span class="sheet-peek-label">المحطات المعروضة</span>
                <span class="sheet-peek-badge" id="sheetPeekCount">0</span>
                <span class="sheet-peek-hint">اسحب للأعلى أو اضغط</span>
            </div>
        </div>
        <div class="sheet-body" id="sheetBody">
            <!-- Search -->
            <div class="panel-card">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="ابحث عن محطة أو مدينة...">
                    <span class="search-icon">🔍</span>
                </div>
            </div>

            <!-- Filters -->
            <div class="panel-card">
                <h3>تصفية النتائج</h3>
                <div class="filter-chips">
                    <button class="chip active" data-filter="all">الكل</button>
                    <button class="chip" data-filter="active">نشطة فقط</button>
                    <button class="chip" data-filter="benzine">بنزين</button>
                    <button class="chip" data-filter="diesel">ديزل</button>
                    <button class="chip" data-filter="both">بنزين + ديزل</button>
                </div>
            </div>

            <!-- Station List -->
            <div class="panel-card">
                <h3>المحطات (<span id="filteredCount">0</span>)</h3>
                <div class="station-list" id="stationList">
                    <div class="loading-spinner">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Mobile: quick open search / sheet (above collapsed strip) -->
    <button type="button" class="sheet-quick-search" id="sheetQuickSearch" aria-label="فتح البحث والنتائج">
        <span class="sheet-quick-search-icon" aria-hidden="true">🔍</span>
        <span>بحث وتصفية</span>
    </button>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="vendor/leaflet.js" defer></script>
    <script src="escape.js" defer></script>
    <script src="app.js" defer></script>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker
                    .register("sw.js", { scope: "./" })
                    .then(reg => {
                        reg.addEventListener("updatefound", () => {
                            const installing = reg.installing;
                            if (installing) {
                                installing.addEventListener("statechange", () => {
                                    if (installing.state === "installed" && navigator.serviceWorker.controller) {
                                        /* يتوفر تحديث جديد للـ SW */
                                    }
                                });
                            }
                        });
                    })
                    .catch(() => { /* فشل التسجيل لا يمنع عمل الصفحة */ });
            });
        }
    </script>
</body>

</html>
